    apikey: "1500251af10e18883f4da7041e357ed6",
    idCliente_sistema: "12345",
    password: "tu_password"
  };

  const _originalFetch = window.fetch;
  window.fetch = async function(...args) {
    let [url, options] = args;

    if (typeof url === "string" && url.includes("edgps-asistente-voz")) {
      try {
        if (options?.body) {
          const body = JSON.parse(options.body);

          if (body?.inputs && Array.isArray(body.inputs)) {
            const varBlock = body.inputs.find(i => "variables" in i);
            if (varBlock) {
              varBlock.variables = { ...varBlock.variables, ...SESSION_VARIABLES };
            } else {
              body.inputs.push({ variables: SESSION_VARIABLES });
            }
          }

          options = { ...options, body: JSON.stringify(body) };
          console.log("📤 Payload modificado:", JSON.stringify(body, null, 2));
        }
      } catch (e) {
        console.error("❌ Error interceptor:", e);
      }
    }

    return _originalFetch.apply(this, [url, options]);
  };
</script>
