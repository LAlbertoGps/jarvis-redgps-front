<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Usar la misma versión para todos los recursos -->
    <script defer
        src="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/chat-messenger.js">
    </script>
    <link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/themes/chat-messenger-default.css">
    <link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/themes/chat-messenger-layout.css">
</head>
<body>

<chat-messenger
    url-allowlist="*"
    color-scheme="dark"
>
    <chat-messenger-container
        chat-title="Redgpsv2"
        enable-file-upload
        enable-audio-input
    >
        <chat-reset-session-button
            slot="titlebar-actions"
            title-text="Start new chat"
        ></chat-reset-session-button>
    </chat-messenger-container>
</chat-messenger>

<script>
    function initializeChat() {
        if (typeof chatSdk === 'undefined') {
            setTimeout(initializeChat, 100);
            return;
        }

        try {
            // Configurar el contexto
            const context = chatSdk.prebuilts.ces.createContext({
                deploymentName: "projects/edgps-asistente-voz/locations/us/apps/f47f3192-2be8-431e-8b5f-924a73a5d00a/deployments/7d5423a3-b3ff-48ab-9930-c17f91604c83",
                tokenBroker: {
                    enableTokenBroker: true,
                    enableRecaptcha: false,
                }
            });

            chatSdk.registerContext(context);
            
            // 👇 ESCUCHAR TODOS LOS EVENTOS DEL CHAT
            const messenger = document.querySelector("chat-messenger");
            
            // Lista de eventos posibles
            const eventos = [
                'chat-connected',
                'chat-disconnected',
                'chat-error',
                'chat-message-received',
                'chat-message-sent',
                'chat-typing-indicator',
                'chat-session-reset',
                'chat-authentication-error',
                'chat-network-error'
            ];

            eventos.forEach(evento => {
                messenger.addEventListener(evento, (e) => {
                    console.log(`📡 EVENTO: ${evento}`, e.detail);
                });
            });

            // 👇 CAPTURAR ERRORES ESPECÍFICOS DE AUTENTICACIÓN
            messenger.addEventListener('chat-error', (e) => {
                console.error('❌ ERROR DETALLADO:', {
                    tipo: e.detail?.type,
                    codigo: e.detail?.code,
                    mensaje: e.detail?.message,
                    detalles: e.detail
                });
            });

            console.log('✅ Sistema de depuración activado');

        } catch (error) {
            console.error('❌ Error en inicialización:', error);
        }
    }

    document.addEventListener('DOMContentLoaded', initializeChat);
</script>

</body>
</html>
