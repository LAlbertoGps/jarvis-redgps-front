<!DOCTYPE html>
<html lang="es">
<head>
<script defer
  src="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/chat-messenger.js">
</script>
<link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/themes/chat-messenger-default.css">
<link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.10/themes/chat-messenger-layout.css">
</head>
<body>

<chat-messenger
  url-allowlist="*"
  color-scheme="dark"
>
  <chat-messenger-container
    chat-title="Redgpsv2"
    chat-title-icon="https://gstatic.com/dialogflow-console/common/assets/ccai-favicons/conversational_agents.png"
    enable-file-upload
    enable-audio-input
  >
    <chat-reset-session-button
      slot="titlebar-actions"
      title-text="Start new chat"
    ></chat-reset-session-button>
  </chat-messenger-container>
</chat-messenger>

<script>
  const SESSION_PARAMS = {
    user: "Prueba",
    apikey: "1500251af10e18883f4da7041e357ed6",
    token: "Ybmc7/dSGdQlc5FfGiBqWtDp+vi6Zgff6GofvmtII04tpjGAyyrKYQ=="
  };

  window.addEventListener("chat-messenger-loaded", () => {

    chatSdk.registerContext(
      chatSdk.prebuilts.ces.createContext({
        deploymentName: "projects/edgps-asistente-voz/locations/us/apps/f47f3192-2be8-431e-8b5f-924a73a5d00a/deployments/7d5423a3-b3ff-48ab-9930-c17f91604c83",
        tokenBroker: {
          enableTokenBroker: true,
          enableRecaptcha: false,
        },
      }),
    );

    const messenger = document.querySelector("chat-messenger");
    if (messenger) {
      messenger.setQueryParameters({
        parameters: SESSION_PARAMS
      });
      console.log("✅ Parámetros de sesión inyectados:", SESSION_PARAMS);
    } else {
      console.error("❌ No se encontró el elemento chat-messenger");
    }

  });
</script>

</body>
</html>
